name: Weekly AI News Update

on:
  schedule:
    - cron: '0 0 * * 5' # Every Friday at midnight
  workflow_dispatch:      # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    # This line tells GitHub to use the newer Node version immediately
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Updated to v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch News
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python fetch_news.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'TechTidyBot'
          git config --global user.email 'bot@techtidy.com'
          git add news.json
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "No new news found today. Skipping commit."
          else
            git commit -m "Weekly News Update"
            git push
          fi
