name: Weekly AI News Update
on:
  schedule:
    - cron: '0 0 * * 5' # Every Friday at midnight
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install requests
      - name: Fetch News
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python fetch_news.py
      - name: Commit and Push changes
        run: |
          git config --global user.name 'TechTidyBot'
          git config --global user.email 'bot@techtidy.com'
          git add news.json
          git commit -m "Weekly News Update"
          git push
