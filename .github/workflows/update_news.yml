name: Update AI News

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests feedparser

      - name: Fetch news and prompt
        run: |
             python fetch_news.py
             python fetch_prompt.py
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }} # Keep this just in case, though RSS doesn't need it

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news.json prompt.json
          git commit -m "Automated News Update: Targeted Intel Scanned" || echo "No changes to commit"
          git push
