<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>AI News | The Future in 60 Seconds</title>
    <meta name="description" content="The most important AI breakthroughs, filtered and summarized for busy humans.">
    <meta property="og:title" content="AI News | The Future in 60 Seconds">
    <meta property="og:description" content="Daily AI insights with ELI5 mode and sentiment tracking.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
</head>
<body>
    <div class="glow-bg"></div>
    
    <header>
        <nav>
            <div class="logo">AI<span>NEWS</span></div>
            
            <div class="nav-right">
                <div class="sentiment-tracker" title="Market & Tech Sentiment">
                    <span class="label">SENTIMENT</span>
                    <div class="meter"><div class="fill" id="sentiment-bar" style="width: 70%;"></div></div>
                </div>

                <div class="toggle-wrapper">
                    <span class="toggle-label">ELI5</span>
                    <label class="switch" aria-label="Toggle Simple Language Mode">
                        <input type="checkbox" id="mode-toggle">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="badge">UPDATED DAILY</div>
            <h1>The Intelligence <br><span class="gradient-text">Briefing.</span></h1>
            <p class="subtitle">Cutting through the noise. AI news for people who value time.</p>
        </section>

        <section id="news-container" class="news-grid">
            <div class="loader">Scanning the neural networks...</div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 AI News. Built for the era of automation.</p>
            <div class="footer-links">
                <a href="https://github.com/rachryan/AI-News" target="_blank">Source</a>
                <a href="#">About</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
