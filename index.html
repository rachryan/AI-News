<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechTidy | Clean Up Your Tech Stack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2ecc71;
            --dark: #0f172a;
            --light: #f8fafc;
            --accent: #22c55e;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            line-height: 1.6; 
            margin: 0; 
            background: var(--light); 
            color: #334155; 
        }

        header { 
            background: var(--dark); 
            color: white; 
            padding: 6rem 1rem 8rem; 
            text-align: center; 
            background-image: radial-gradient(circle at 2px 2px, #334155 1px, transparent 0);
            background-size: 40px 40px;
        }

        header h1 { 
            font-size: 3.5rem; 
            margin: 0; 
            font-weight: 800;
            letter-spacing: -0.05em;
            background: linear-gradient(to right, #2ecc71, #a7f3d0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p { 
            opacity: 0.9; 
            font-size: 1.25rem; 
            max-width: 600px; 
            margin: 1.5rem auto 0;
            color: #cbd5e1;
        }

        #news-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); 
            gap: 2.5rem; 
            max-width: 1200px; 
            margin: -4rem auto 4rem; 
            padding: 0 1.5rem;
        }

        .card { 
            background: white; 
            border-radius: 24px; 
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
        }

        .card:hover { 
            transform: translateY(-12px); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: var(--primary);
        }

        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #e2e8f0;
        }

        .card-content {
            padding: 1.75rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card small { 
            color: var(--accent); 
            font-weight: 700; 
            text-transform: uppercase; 
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        .card h3 { 
            margin: 0.75rem 0; 
            color: var(--dark); 
            font-size: 1.25rem;
            line-height: 1.4;
            font-weight: 700;
        }

        .card p { 
            font-size: 0.95rem; 
            color: #64748b; 
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .card a { 
            text-decoration: none; 
            color: var(--dark);
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s;
        }

        .card a:hover { color: var(--primary); }

        #subscribe { 
            max-width: 600px; 
            margin: 6rem auto; 
            padding: 4rem 2rem; 
            background: var(--dark); 
            color: white;
            border-radius: 32px; 
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        #subscribe h2 { font-size: 2rem; margin-top: 0; }

        input[type="email"] { 
            padding: 1.25rem; 
            width: 80%; 
            max-width: 320px;
            border: none;
            border-radius: 12px; 
            margin-bottom: 1rem;
            font-size: 1rem;
            outline: none;
        }

        button { 
            padding: 1.25rem 2.5rem; 
            background: var(--primary); 
            color: var(--dark); 
            border: none; 
            border-radius: 12px; 
            font-weight: 800; 
            cursor: pointer; 
            transition: all 0.2s;
        }

        button:hover { transform: scale(1.05); background: #58f09b; }

        footer { text-align: center; padding: 4rem 2rem; color: #94a3b8; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <h1>✨ TechTidy</h1>
        <p>Curated AI news to help you declutter your workflow and optimize your tech stack.</p>
    </header>

    <main id="news-container">
        <p style="grid-column: 1/-1; text-align: center; padding: 5rem;">Loading this week's essentials...</p>
    </main>

    <section id="subscribe">
        <h2>Join the Tidiest Inbox</h2>
        <p>Get the Friday AI toolkit delivered straight to you.</p>
        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
            <input type="email" name="email" placeholder="you@example.com" required>
            <button type="submit">Subscribe</button>
        </form>
    </section>

    <footer>
        &copy; 2026 TechTidy • Built for a cleaner tech stack.
    </footer>

    <script>
        async function loadNews() {
            const container = document.getElementById('news-container');
            try {
                const response = await fetch('./news.json?t=' + Date.now());
                const news = await response.json();
                
                if (!news || news.length === 0) {
                    container.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">Everything is tidy. Check back Friday!</p>';
                    return;
                }

                container.innerHTML = ''; 

                news.forEach(article => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        ${article.urlToImage ? `<img src="${article.urlToImage}" class="card-img" alt="news">` : ''}
                        <div class="card-content">
                            <small>Tool Update</small>
                            <h3>${article.title}</h3>
                            <p>${article.description || 'No description available.'}</p>
                            <a href="${article.url}" target="_blank">Read Summary ➔</a>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">Updates are arriving soon...</p>';
            }
        }
        window.onload = loadNews;
    </script>
</body>
</html>
