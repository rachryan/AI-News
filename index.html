<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechTidy | Clean Up Your Tech Stack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2ecc71;
            --dark: #1a1a1a;
            --light: #f9f9f9;
            --text: #333;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            line-height: 1.6; 
            margin: 0; 
            background: var(--light); 
            color: var(--text); 
        }

        header { 
            background: var(--dark); 
            color: white; 
            padding: 5rem 1rem; 
            text-align: center; 
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
        }

        header h1 { 
            font-size: 3.5rem; 
            margin: 0; 
            letter-spacing: -2px; 
        }

        header p { 
            opacity: 0.8; 
            font-size: 1.2rem; 
            max-width: 600px; 
            margin: 1rem auto 0;
        }

        #news-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 2rem; 
            max-width: 1200px; 
            margin: -60px auto 4rem; 
            padding: 0 1.5rem;
        }

        .card { 
            background: white; 
            padding: 2rem; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .card h3 { 
            margin: 0.5rem 0; 
            color: var(--dark); 
            font-size: 1.4rem;
            line-height: 1.2; 
        }

        .card p { 
            font-size: 0.95rem; 
            color: #666; 
            flex-grow: 1; 
        }

        .card a { 
            display: inline-block; 
            margin-top: 1.5rem; 
            color: var(--primary); 
            text-decoration: none; 
            font-weight: 700; 
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        #subscribe { 
            max-width: 500px; 
            margin: 6rem auto; 
            padding: 3rem; 
            background: white; 
            border-radius: 24px; 
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 2px solid var(--primary);
        }

        #subscribe h2 { margin-top: 0; }

        input[type="email"] { 
            padding: 1rem; 
            width: 80%; 
            border: 1px solid #ddd; 
            border-radius: 12px; 
            margin-bottom: 1rem;
            font-size: 1rem;
        }

        button { 
            padding: 1rem 2.5rem; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 1rem;
            cursor: pointer; 
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        footer { text-align: center; padding: 2rem; color: #999; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <h1>✨ TechTidy</h1>
        <p>Your weekly digest of AI news to help you clean up and optimize your tech stack.</p>
    </header>

    <main id="news-container">
        <p style="grid-column: 1/-1; text-align: center; padding: 4rem;">Tidying up the latest news...</p>
    </main>

    <section id="subscribe">
        <h2>Stay Organized</h2>
        <p>Get the Friday AI roundup delivered to your inbox.</p>
        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
            <input type="email" name="email" placeholder="email@example.com" required>
            <br>
            <button type="submit">Join TechTidy</button>
        </form>
    </section>

    <footer>
        &copy; 2026 TechTidy. All rights reserved.
    </footer>

    <script>
        async function loadNews() {
            const container = document.getElementById('news-container');
            try {
                // Fetch with a cache-buster timestamp to ensure we see the latest news
                const response = await fetch('./news.json?t=' + Date.now());
                
                if (!response.ok) throw new Error("news.json not found");
                
                const news = await response.json();
                
                if (!news || news.length === 0) {
                    container.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">No news found this week. Check back next Friday!</p>';
                    return;
                }

                container.innerHTML = ''; // Clear the loading state

                news.forEach(article => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <small style="color: #2ecc71; font-weight: bold;">LATEST UPDATE</small>
                        <h3>${article.title}</h3>
                        <p>${article.description || 'No description available for this article.'}</p>
                        <a href="${article.url}" target="_blank">Read Full Article →</a>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error("Error loading news:", error);
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">News is currently being updated. Please check back in a few minutes!</p>';
            }
        }

        // Run the function when the page loads
        window.onload = loadNews;
    </script>
</body>
</html>
