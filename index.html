<style>
    :root {
        --primary: #2ecc71;
        --dark: #1a1a1a;
        --light: #f9f9f9;
        --text: #333;
    }
    body { 
        font-family: 'Inter', system-ui, sans-serif; 
        line-height: 1.6; 
        margin: 0; 
        background: var(--light); 
        color: var(--text); 
    }
    header { 
        background: var(--dark); 
        color: white; 
        padding: 4rem 1rem; 
        text-align: center; 
        clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
    }
    header h1 { font-size: 3rem; margin: 0; letter-spacing: -1px; }
    header p { opacity: 0.8; font-size: 1.1rem; }

    #news-container { 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
        gap: 2rem; 
        max-width: 1100px; 
        margin: -50px auto 4rem; 
        padding: 0 1rem;
    }

    .card { 
        background: white; 
        padding: 2rem; 
        border-radius: 16px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
        transition: transform 0.3s ease;
        display: flex;
        flex-direction: column;
    }
    .card:hover { transform: translateY(-5px); }
    .card h3 { margin-top: 0; color: var(--dark); line-height: 1.3; }
    .card p { font-size: 0.95rem; color: #666; flex-grow: 1; }
    .card a { 
        display: inline-block; 
        margin-top: 1rem; 
        color: var(--primary); 
        text-decoration: none; 
        font-weight: 700; 
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 1px;
    }

    #subscribe { 
        max-width: 600px; 
        margin: 4rem auto; 
        padding: 3rem; 
        background: white; 
        border-radius: 20px; 
        text-align: center;
        border: 2px solid var(--primary);
    }
    input[type="email"] { 
        padding: 1rem; 
        width: 100%; 
        max-width: 300px; 
        border: 1px solid #ddd; 
        border-radius: 8px; 
        margin-bottom: 1rem;
    }
    button { 
        padding: 1rem 2rem; 
        background: var(--primary); 
        color: white; 
        border: none; 
        border-radius: 8px; 
        font-weight: bold; 
        cursor: pointer; 
    }
</style>
