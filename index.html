<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechTidy | The Intelligence Briefing</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="glow-bg"></div>

    <header>
        <nav>
            <div class="logo">TECH<span>TIDY</span></div>
            <div class="nav-right">
                <div class="sentiment-tracker">
                    <span class="label">SENTIMENT</span>
                    <div class="meter"><div class="fill" style="width: 75%;"></div></div>
                </div>
                <div class="toggle-wrapper">
                    <span class="label">ELI5</span>
                    <label class="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="badge" id="update-tag">SCANNING THE NEURAL NETWORKS...</div>
            <h1 class="gradient-text">The Intelligence Briefing.</h1>
            <p class="subtitle">Cutting through the noise. AI news and training for people who value time.</p>
        </section>

        <div style="text-align: center; margin-bottom: 2rem;">
            <input type="text" id="search" placeholder="SEARCH PARAMETERS..." 
                style="background: transparent; border: none; border-bottom: 1px solid var(--glass-border); color: white; font-family: 'JetBrains Mono'; padding: 10px; width: 300px; outline: none; text-align: center;">
        </div>

        <div id="news-container" class="news-grid">
            <p style="text-align: center; grid-column: 1/-1;">Establishing connection...</p>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>TechTidy Briefing. No fluff. Just Intel.</p>
            <form action="https://formspree.io/f/YOUR_ID" method="POST" style="margin: 2rem 0;">
                <input type="email" name="email" placeholder="ENTER EMAIL" required 
                    style="background: #111; border: 1px solid var(--glass-border); color: white; padding: 12px; border-radius: 8px;">
                <button type="submit" class="share-btn" style="padding: 12px 24px; margin-left: 10px;">SUBSCRIBE</button>
            </form>
            <div class="footer-links">
                <a href="https://chat.openai.com" target="_blank">CHATGPT</a>
                <a href="https://claude.ai" target="_blank">CLAUDE</a>
                <a href="https://perplexity.ai" target="_blank">PERPLEXITY</a>
            </div>
        </div>
    </footer>

    <script>
        async function loadNews() {
            const container = document.getElementById('news-container');
            const updateTag = document.getElementById('update-tag');
            try {
                const response = await fetch('./news.json?t=' + Date.now());
                const data = await response.json();
                
                if(data.last_updated) updateTag.innerText = "UPDATED: " + data.last_updated;
                
                const articles = data.articles || [];
                container.innerHTML = ''; 

                articles.forEach((article, index) => {
                    const card = document.createElement('div');
                    // This uses your specific .news-card class from CSS
                    card.className = index === 0 ? 'news-card featured' : 'news-card';
                    card.innerHTML = `
                        <div class="card-tag">INTEL_LOG_${index + 1}</div>
                        <h2 class="headline">${article.title}</h2>
                        <p class="summary">${article.description || 'System scan complete. No summary provided.'}</p>
                        <div class="card-footer">
                            <span class="date">SOURCE: AI_FEED</span>
                            <a href="${article.url}" target="_blank" class="share-btn" style="text-decoration: none;">FULL INTEL</a>
                        </div>
                    `;
                    container.appendChild(card);
                });

                // Live Search Logic
                document.getElementById('search').addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    document.querySelectorAll('.news-card').forEach(card => {
                        const text = card.innerText.toLowerCase();
                        card.style.display = text.includes(term) ? 'flex' : 'none';
                    });
                });
            } catch (e) {
                container.innerHTML = '<p>Error: Connection lost.</p>';
            }
        }
        window.onload = loadNews;
    </script>
</body>
</html>
