<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechTidy | Clean Up Your Tech Stack</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 2rem; background: #f4f7f6; color: #333; }
        header { text-align: center; margin-bottom: 3rem; }
        .card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 1.5rem; border-left: 5px solid #2ecc71; }
        .card h3 { margin-top: 0; }
        .card a { color: #2ecc71; text-decoration: none; font-weight: bold; }
        #subscribe { background: #2c3e50; color: white; padding: 2rem; border-radius: 12px; text-align: center; }
        input[type="email"] { padding: 0.5rem; width: 60%; border-radius: 4px; border: none; }
        button { padding: 0.5rem 1rem; background: #2ecc71; border: none; color: white; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h1>✨ TechTidy</h1>
        <p>Weekly AI insights to declutter and optimize your tech stack.</p>
    </header>

    <main id="news-container">
        <p>Loading this week's AI updates...</p>
    </main>

    <section id="subscribe">
        <h2>Stay Tidy</h2>
        <p>Get the Friday digest directly in your inbox.</p>
        <form action="https://formspree.io/f/YOUR_ID_HERE" method="POST">
            <input type="email" name="email" placeholder="you@example.com" required>
            <button type="submit">Subscribe</button>
        </form>
    </section>

    <script>
        // Fetch the news.json file generated by your Python script
        async function loadNews() {
            try {
                const response = await fetch('./news.json');
                const news = await response.json();
                const container = document.getElementById('news-container');
                container.innerHTML = ''; // Clear loading text

                news.forEach(article => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
                        <h3>${article.title}</h3>
                        <p>${article.description || 'No description available.'}</p>
                        <a href="${article.url}" target="_blank">Read More →</a>
                    `;
                    container.appendChild(div);
                });
            } catch (e) {
                document.getElementById('news-container').innerHTML = '<p>Check back on Friday for fresh news!</p>';
            }
        }
        loadNews();
    </script>
</body>
</html>
